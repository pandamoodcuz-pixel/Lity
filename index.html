<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio & Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* === ตัวแปรสีจากพาเลตต์ === */
        :root {
            --color-fantasy: #F7F3ED; /* สีพื้นหลัง */
            --color-vanilla: #EFD8D6; /* สีรอง / การ์ด */
            --color-brown: #91766E;   /* สีหลัก / ข้อความ / ปุ่ม */
            --color-text-dark: #4a3b37;
            --color-white: #FFFFFF;
        }

        /* === ตั้งค่าเริ่มต้น === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Prompt', sans-serif;
        }

        body {
            background-color: var(--color-fantasy);
            color: var(--color-text-dark);
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        /* === Header === */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: var(--color-white);
            border-bottom: 2px solid var(--color-vanilla);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .menu-icon {
            font-size: 24px;
            color: var(--color-brown);
            cursor: pointer;
            font-weight: bold;
        }

        .profile-name {
            background-color: var(--color-brown);
            color: var(--color-white);
            padding: 5px 20px;
            border-radius: 20px;
            font-weight: 500;
            font-size: 16px;
        }

        /* === Section 1: Top Profile === */
        .top-section {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
            margin-top: 30px;
            margin-bottom: 40px;
        }

        /* Image Slider Placeholder */
        .image-slider {
            background-color: var(--color-white);
            border: 2px solid var(--color-vanilla);
            border-radius: 12px;
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .image-slider p {
            color: var(--color-brown);
            font-weight: 500;
        }

        .slider-controls {
            position: absolute;
            bottom: 15px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
        }

        .slider-controls span {
            font-size: 24px;
            color: var(--color-brown);
            cursor: pointer;
            font-weight: bold;
        }

        /* Store Info */
        .store-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }

        .store-info h1 {
            color: var(--color-brown);
            font-size: 32px;
            margin-bottom: 5px;
        }

        .store-info .subtitle {
            color: var(--color-text-dark);
            margin-bottom: 20px;
            font-size: 16px;
        }

        /* Contact Box */
        .contact-box {
            background-color: var(--color-vanilla);
            padding: 20px;
            border-radius: 12px;
            margin-top: auto;
        }

        .contact-box h3 {
            color: var(--color-brown);
            margin-bottom: 15px;
            font-size: 18px;
        }

        .social-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            flex: 1;
            background-color: var(--color-white);
            border: 2px solid var(--color-brown);
            color: var(--color-brown);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
        }

        .btn span.click {
            font-size: 12px;
            font-weight: 400;
            background-color: var(--color-brown);
            color: var(--color-white);
            padding: 2px 10px;
            border-radius: 10px;
            margin-top: 5px;
        }

        .btn:hover {
            background-color: var(--color-brown);
            color: var(--color-white);
        }

        /* === Section 2: Details Grid === */
        .details-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .card {
            background-color: var(--color-white);
            border: 2px solid var(--color-vanilla);
            border-radius: 12px;
            padding: 25px 20px;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            text-align: center;
        }

        /* สไตล์หัวข้อการ์ดแบบลอย (คล้ายแบบร่าง) */
        .card-title {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--color-brown);
            color: var(--color-white);
            padding: 5px 20px;
            border-radius: 20px;
            font-weight: 500;
            font-size: 14px;
            white-space: nowrap;
        }

        .card-content {
            margin-top: 10px;
            color: var(--color-text-dark);
        }

        .card.about-me { min-height: 150px; }
        .card.how-to-order { min-height: 150px; display: flex; align-items: center; justify-content: center;}
        .card.how-to-order h2 { color: var(--color-brown); }
        
        .card.example-work .btn-example {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 25px;
            background-color: var(--color-white);
            border: 2px solid var(--color-brown);
            color: var(--color-brown);
            border-radius: 20px;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }
        
        .card.example-work .btn-example:hover {
            background-color: var(--color-brown);
            color: var(--color-white);
        }

        .card.price { min-height: 200px; display: flex; flex-direction: column; justify-content: center;}

        /* === Responsive Desktop / Tablet === */
        @media (min-width: 768px) {
            .top-section {
                grid-template-columns: 1fr 1fr;
                align-items: stretch;
            }
            .store-info {
                text-align: left;
            }
            .social-buttons {
                justify-content: flex-start;
            }
            .details-grid {
                grid-template-columns: 1fr 1fr;
            }
            /* จัดกลุ่มให้ฝั่งซ้ายและขวาตรงกับ Wireframe */
            .col-left {
                display: flex;
                flex-direction: column;
                gap: 20px;
            }
            .col-right {
                display: flex;
                flex-direction: column;
                gap: 20px;
            }
            .card {
                height: 100%;
            }
        }
    </style>
</head>
